services:
  frontend:
    container_name: frontend
    image: "frontend.messenger.dev"
    networks:
      - frontend
    ports:
      - 3000:3000
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    volumes:
      - ./:/app
    env_file:
      - path: '.env'
    tty: true

networks:
  frontend:
    driver: bridge
